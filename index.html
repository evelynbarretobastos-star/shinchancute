<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你想復合嗎？</title>
    <style>
        body {
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: manipulation; /* Melhora a resposta ao toque */
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
            min-height: 100px;
            padding: 0 15px;
        }

        .gif-container {
            height: 300px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .botoes-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100px;
            position: relative;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* Remove o brilho ao tocar no celular */
        }

        #btnSim {
            background-color: #ff4d6d;
            color: white;
            z-index: 1;
        }

        #btnNao {
            background-color: #888;
            color: white;
            z-index: 2;
        }
    </style>
</head>
<body>

    <h1 id="tituloMain">你想復合嗎？</h1>

    <div class="gif-container">
        <img id="imagemAnimada" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaWp6M2Z6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/MBfnmipP1NfTSKr2IE/giphy.gif" width="300" alt="Shin-chan">
    </div>

    <div class="botoes-container">
        <button id="btnSim" onclick="responderSim()">是</button>
        <button id="btnNao" 
                onmouseover="fugirENao(event)" 
                ontouchstart="fugirENao(event)" 
                onclick="fugirENao(event)">不</button>
    </div>

    <script>
        let tamanhoFonteSim = 1.2;

        function responderSim() {
            document.getElementById("tituloMain").innerHTML = "我始終都知道 ❤️<br><span style='font-size: 1.5rem;'>我愛你</span>";
            document.getElementById("btnSim").style.display = "none";
            document.getElementById("btnNao").style.display = "none";
            document.getElementById("imagemAnimada").src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaWp6M2Z6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6Znh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/d47HFwAbGv3OmqfC/giphy.gif";
        }

        function fugirENao(event) {
            // Previne o clique real ou zoom no celular
            if (event) {
                event.preventDefault();
            }

            const btnNao = document.getElementById("btnNao");
            const btnSim = document.getElementById("btnSim");

            // Define limites para o botão não sair da tela (ajustado para celular)
            const larguraBotao = btnNao.offsetWidth;
            const alturaBotao = btnNao.offsetHeight;

            const maxX = window.innerWidth - larguraBotao - 20;
            const maxY = window.innerHeight - alturaBotao - 20;

            const x = Math.max(10, Math.random() * maxX);
            const y = Math.max(10, Math.random() * maxY);
            
            btnNao.style.position = "fixed";
            btnNao.style.left = x + "px";
            btnNao.style.top = y + "px";

            // Crescimento do botão SIM
            tamanhoFonteSim += 0.5; 
            btnSim.style.fontSize = tamanhoFonteSim + "rem";
            
            let padV = parseInt(window.getComputedStyle(btnSim).paddingTop);
            let padH = parseInt(window.getComputedStyle(btnSim).paddingLeft);
            btnSim.style.padding = (padV + 5) + "px " + (padH + 10) + "px";
        }
    </script>

</body>
</html>
